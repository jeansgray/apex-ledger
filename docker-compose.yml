# Apex Ledger + MiroFish (AGPL HTTP boundary — separate containers).
# Prerequisites: git submodule update --init, cp .env.example .env
# Keys: mount via env_file (.env); never bake secrets into images.

services:
  kronos:
    build:
      context: .
      dockerfile: docker/Dockerfile.kronos
    container_name: apex-kronos
    environment:
      KRONOS_FIXTURES_DIR: /app/fixtures/kronos
      KRONOS_FIXTURE_ONLY: "false"
    ports:
      - "5002:5002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mirofish:
    build:
      context: .
      dockerfile: docker/Dockerfile.mirofish
    container_name: apex-mirofish
    env_file:
      - .env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5001"
      FLASK_DEBUG: "false"
    ports:
      - "5001:5001"
    volumes:
      # MiroFish config resolves uploads to backend/uploads (../uploads from app/)
      - ./vendor/mirofish/backend/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  apex:
    build:
      context: .
      dockerfile: docker/Dockerfile.apex
    container_name: apex-ledger
    env_file:
      - .env
    environment:
      MIROFISH_BASE_URL: http://mirofish:5001
      KRONOS_BASE_URL: http://kronos:5002
      MIROFISH_DEFAULT_SIMULATION_ID: sim_apex_personal_investor
      APEX_DATA_DIR: /app/data
      APEX_LEDGER_DB: /app/data/ledger.db
      APEX_PUBLIC_BASE_URL: http://127.0.0.1:8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./.cursor/skills:/app/.cursor/skills:ro
    depends_on:
      kronos:
        condition: service_healthy
      mirofish:
        condition: service_healthy
    restart: unless-stopped
